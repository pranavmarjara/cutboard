<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="55%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="strip" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="pen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C4B5FD" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="40" height="40" rx="10" fill="url(#bg)"/>

  <!-- Film strip body -->
  <rect x="7" y="6" width="14" height="28" rx="2.5" fill="url(#strip)" opacity="0.92"/>

  <!-- Left perforations -->
  <rect x="7.5" y="9.5"  width="3.5" height="3" rx="0.9" fill="rgba(5,5,20,0.45)"/>
  <rect x="7.5" y="15"   width="3.5" height="3" rx="0.9" fill="rgba(5,5,20,0.45)"/>
  <rect x="7.5" y="20.5" width="3.5" height="3" rx="0.9" fill="rgba(5,5,20,0.45)"/>
  <rect x="7.5" y="26"   width="3.5" height="3" rx="0.9" fill="rgba(5,5,20,0.45)"/>

  <!-- Right perforations -->
  <rect x="17" y="9.5"  width="3.5" height="3" rx="0.9" fill="rgba(5,5,20,0.45)"/>
  <rect x="17" y="15"   width="3.5" height="3" rx="0.9" fill="rgba(5,5,20,0.45)"/>
  <rect x="17" y="20.5" width="3.5" height="3" rx="0.9" fill="rgba(5,5,20,0.45)"/>
  <rect x="17" y="26"   width="3.5" height="3" rx="0.9" fill="rgba(5,5,20,0.45)"/>

  <!-- Pen / stylus — rotated, upper right area -->
  <g transform="translate(30, 18) rotate(38)">
    <!-- Pen body -->
    <rect x="-3" y="-11" width="6" height="16" rx="3" fill="url(#pen)" filter="url(#glow)"/>
    <!-- Pen cap darker top -->
    <rect x="-3" y="-11" width="6" height="4.5" rx="3" fill="rgba(180,160,255,0.5)"/>
    <!-- Pen nib -->
    <polygon points="-3,5 3,5 0,10" fill="rgba(255,255,255,0.82)"/>
    <!-- Nib tip -->
    <polygon points="-1.2,8.5 1.2,8.5 0,10" fill="rgba(244,114,182,0.9)"/>
  </g>
</svg>
